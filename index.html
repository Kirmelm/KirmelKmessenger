<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <meta charset="UTF-8">
    <title>TG Clone for Friends</title>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 500px; height: 100vh; display: flex; flex-direction: column; background: #17212b; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; background: #2b5278; align-self: flex-start; max-width: 80%; }
        .my-msg { align-self: flex-end; background: #182533; border: 1px solid #2b5278; }
        .footer { padding: 15px; display: flex; background: #242f3d; }
        input { flex: 1; padding: 10px; border: none; border-radius: 5px; background: #17212b; color: white; outline: none; }
        button { background: none; border: none; color: #50a2e9; font-weight: bold; cursor: pointer; padding-left: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="chat"></div>
        <div class="footer">
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <button onclick="send()">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script>
        // ВСТАВЬ СВОИ ДАННЫЕ ИЗ FIREBASE СЮДА
    const firebaseConfig = {
    apiKey: "AIzaSyCiBCWNQGMSM3uMu8DaKLGG-rwumfbajBE",
    authDomain: "kirmelk-dbd0e.firebaseapp.com",
    databaseURL: "https://kirmelk-dbd0e-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "kirmelk-dbd0e",
    storageBucket: "kirmelk-dbd0e.appspot.com",
    messagingSenderId: "151695594619",
    appId: "1:151695594619:web:875c26eebf2dc4446bede"
    };

        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('messages');
        const myId = Math.random().toString(36).substring(7); // Твой временный ID

        // Отправка
        function send() {
            const text = document.getElementById('msg-input').value;
            if (!text) return;
            db.push({ id: myId, text: text, time: Date.now() });
            document.getElementById('msg-input').value = '';
        }

        // Получение сообщений в реальном времени
        db.limitToLast(20).on('value', (snap) => {
            const chat = document.getElementById('chat');
            chat.innerHTML = '';
            snap.forEach(child => {
                const m = child.val();
                const isMy = m.id === myId;
                chat.innerHTML += `<div class="msg ${isMy ? 'my-msg' : ''}">${m.text}</div>`;
            });
            chat.scrollTop = chat.scrollHeight;
        });

        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') send() };
    </script>
</body>
</html>
